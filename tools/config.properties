# ─────────────────────────────────────────────────────────────────────────────
# JarAnalyzer — config.properties
#
# Override any built-in default without recompiling.
# Lines starting with # are comments. All values are pipe-separated (|) where
# lists are needed. Each key=value replaces the built-in default completely.
# ─────────────────────────────────────────────────────────────────────────────

# ── Majanito dropper / EtherHiding C2 ────────────────────────────────────────

# Known Ethereum contract that stores the C2 base URL (used as fallback if
# source-based detection fails)
dropper.eth.contract=0x1280a841Fbc1F883365d3C83122260E0b2995B74

# ABI method selector for the getText() getter on the contract
dropper.eth.method=0xce6d41de

# Exfil and stage2 URL paths (relative to C2 base). Used as fallback when
# dynamic path detection from source finds nothing.
dropper.exfil.path=/api/delivery/handler
dropper.stage2.path=/files/jar/module

# Fully-qualified class name that contains the Stage 2 entry point
dropper.stage2.class=dev.majanito.Main

# Method name inside that class that bootstraps the payload
dropper.stage2.method=initializeWeedhack

# Public Ethereum RPC nodes to try when resolving the C2 URL (pipe-separated)
dropper.eth.rpcs=https://eth.llamarpc.com|https://eth.api.onfinality.io/public|https://rpc.eth.gateway.fm|https://ethereum-rpc.publicnode.com|https://eth.rpc.blxrbdn.com|https://ethereum.rpc.subquery.network/public|https://ethereum-json-rpc.stakely.io|https://ethereum-public.nodies.app|https://mainnet.gateway.tenderly.co|https://ethereum-mainnet.gateway.tatum.io|https://eth1.lava.build|https://eth.meowrpc.com|https://rpc.flashbots.net/fast|https://rpc.flashbots.net|https://eth.drpc.org|https://1rpc.io/eth

# ── XOR key size heuristics (AdamRat config decryption) ──────────────────────

# Primary (tight) range — byte array of this size is assumed to be the XOR key
xor.key.primary.min=44
xor.key.primary.max=48

# Fallback (loose) range — used if nothing in the primary range is found
xor.key.fallback.min=20
xor.key.fallback.max=100

# ── Variant classification hints ──────────────────────────────────────────────

# Session harvester: package path fragments (pipe-separated, case-insensitive)
session.harvester.packages=dev_majanito|dev/majanito

# Session harvester: class name fragments (pipe-separated)
session.harvester.classes=SessionIDLogin|LoginScreen|APIUtils

# Majanito dropper: class name fragments that indicate a dropper (pipe-separated)
majanito.dropper.classes=FabricAdapter

# Majanito dropper: helper class name suffixes (pipe-separated)
majanito.dropper.helpers=Helper_class|Helper.class

# Majanito dropper: ZIP entry whose presence indicates a dropper
majanito.dropper.zipentry=fabric.api.json

# Majanito dropper: raw string signatures scanned in class bytes (pipe-separated)
# If any of these appear in raw class file bytes the JAR is classified as a dropper.
majanito.dropper.rawstrings=eth_call|initializeWeedhack|dev.majanito

# AdamRat: obfuscation class name fragments (pipe-separated)
adamrat.obf.classes=vubsyodfkejzllnk|upokyqklsolkxbys

# AdamRat: main client class name fragment
adamrat.client.class=ExampleModClient

# AdamRat: inner class name fragments — presence alongside the client class
#           strongly indicates AdamRat (pipe-separated)
adamrat.inner.classes=$xyz123|$abc456|$c0nfig|$aPconf

# AdamRat: control-flow obfuscation string signatures in decompiled source
#           (pipe-separated; any match → "AdamRat obfuscation signature" marker)
adamrat.obf.signatures=pynvtoxahbmzany|feghssgcoq|upokyqklsolkxbys

# ── Casino cheat detection ────────────────────────────────────────────────────

# Class name fragments that indicate a casino cheating module (pipe-separated)
casino.class.hints=LegitRigController|PaperGameDispenser|aseity|optimization_rig

# ── Library class skip list ───────────────────────────────────────────────────

# Class name prefixes to skip during decompilation (speeds up analysis, avoids
# bloating output with library code). Uses underscore as path separator.
library.class.prefixes=com_google_|org_apache_|kotlin_|io_netty_|com_mojang_|org_slf4j_|javax_|java_|org_objectweb_|org_lwjgl_|com_formdev_|org_json_|net_fabricmc_|org_gradle_|com_sun_|sun_|jdk_|org_ow2_|it_unimi_|org_checkerframework_|org_intellij_|org_jetbrains_|com_ibm_|org_jline_|org_yaml_|com_electronwill_|org_spongepowered_|io_ktor_|kotlinx_|org_bouncycastle_|com_fasterxml_|io_github_|net_minecraft_|cpw_mods_|net_minecraftforge_

# ── Behavioral source-level patterns ─────────────────────────────────────────
#
# Format: pattern=label (pipe-separated, one pattern=label per segment)
# The analyzer searches decompiled source for each pattern; if found, the label
# is added to the behavioral markers list.
#
# Add new malicious domains or API calls here — no recompile needed.
#
behavioral.patterns=Runtime.getRuntime().exec(=Executes system commands via Runtime.exec() — used legitimately for launching processes, but also by RATs for payload delivery|ProcessBuilder=Spawns system processes via ProcessBuilder — common in launchers and installers, but RATs use it for stealthy command execution|launcher_accounts=Reads launcher_accounts.json — contains Minecraft session tokens that can hijack accounts if exfiltrated|accessToken=References session/auth tokens — legitimate mods read these for API calls, but stealers exfiltrate them|HttpURLConnection=Makes HTTP connections — normal for update checks and downloads, suspicious if combined with token access|discord.com/api/webhooks=Contains Discord webhook URL — used to send stolen data to attacker-controlled channels|adamrat.shop=Contains known malicious domain adamrat.shop — associated with AdamRAT stealer infrastructure|whnewreceive.ru=Contains known malicious domain whnewreceive.ru — AdamRAT C2 exfiltration endpoint|whereceiver.ru=Contains known malicious domain whereceiver.ru — AdamRAT C2 exfiltration endpoint|weedhack=References Weedhack malware infrastructure — Majanito/EtherHiding RAT family|FileOutputStream=Writes files to disk — normal for installers, suspicious if writing to startup folders or system dirs|System.getenv=Reads environment variables — legitimate for config, but stealers harvest OS username, paths, and tokens|initializeWeedhack=Calls Majanito Stage 2 bootstrap — confirmed Weedhack RAT initialization|eth_call=Makes Ethereum RPC calls — used by EtherHiding C2 to fetch command server URL from blockchain|FabricAdapter=Contains Majanito dropper component FabricAdapter — hooks into Fabric mod loader for persistence|minecraftservices.com=Contacts Minecraft session API — legitimate for auth, but stealers use it to validate stolen tokens|Authorization=Sets Authorization header — normal for API calls, suspicious if combined with token harvesting|javaw.exe=Launches windowless Java process — hides console to run silently, common in RATs and malware installers|LegitRigController=Contains casino rig cheat module — manipulates game mechanics for cheating|writeDigitValue=Manipulates NBT item values — used in casino cheating to rig game outcomes

# ── Raw-byte patterns ────────────────────────────────────────────────────────
#
# Same format as behavioral.patterns but searched in raw class file bytes
# (catches strings that CFR decompilation might mangle or miss).
#
raw.patterns=pynput=Keylogger library (pynput) referenced|win32crypt=DPAPI credential decryption (win32crypt) referenced|adamrat.shop=Known C2 domain in class data (adamrat.shop)|whnewreceive=Known C2 domain in class data (whnewreceive.ru)|0x1280a841=Known Ethereum contract address|dev.majanito=Majanito author namespace in class data
